[pytest]
asyncio_mode = auto

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (uses the full app)
    load: Load tests (requires running server)

testpaths =
    test_coverage.py
    test_auth.py
    test_metrics.py
    test_pipeline.py
    test_classifier.py

log_cli = true
log_cli_level = WARNING

filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
addopts = --cov-fail-under=70